site_name: DonaDataset
site_description: Camera-trap mammal dataset from Doñana National Park
site_url: https://wildintelproject.github.io/donadataset/
copyright: Copyright &copy; 2026 <a href="https://wildintel.eu/">WildINTEL</a>

repo_url: https://github.com/wildintelproject/donadataset
repo_name: wildintelproject/donadataset

theme:
  name: material
  language: en
  logo: img/WildINTEL_onlyCircle_25.png
  favicon: img/WildINTEL_onlyCircle_25.png

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wildintelproject
      name: WildINTEL on GitHub
    - icon: simple/huggingface
      link: https://huggingface.co/wildintelproject
      name: WildINTEL on HuggingFace Hub
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/people/WildIntel/61556603674655/
      name: WildINTEL on Facebook
    - icon: simple/bluesky
      link: https://bsky.app/profile/wildintel.bsky.social
      name: WildINTEL on Bluesky
    - icon: fontawesome/solid/globe
      link: https://wildintel.eu/
      name: WildINTEL website

extra_css:
  - stylesheets/extras.css

markdown_extensions:
  - toc:
      title: On this page
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  # Solo se activa con la variable de entorno ENABLE_PDF_EXPORT=1 (la pone
  # 'uv run cli docs pdf') — generar el PDF añade tiempo de build (WeasyPrint
  # renderiza cada página), así que 'docs serve'/'docs build' normales no
  # pagan ese coste.
  - with-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
      output_path: pdf/donadataset.pdf
      cover_title: DonaDataset
      cover_subtitle: Camera-trap mammal dataset from Doñana National Park
      author: WildINTEL
      copyright: Copyright © 2026 WildINTEL
      toc_title: Table of contents
      toc_level: 2

nav:
  - Home: index.md
  - Dataset Description: dataset-description.md
  - User Guide: user-guide.md
  - Publishing:
      - Overview (all repositories): publishing-guide.md
      - HuggingFace Hub: publishing-huggingface.md
      - Zenodo: publishing-zenodo.md
      - B2SHARE: publishing-b2share.md
      - GBIF: publishing-gbif.md
  - About: about.md