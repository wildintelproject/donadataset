# DonaDataset — class definitions
# Each entry maps a YOLO label id to the dataset label name.
# Labels 0–15 are object categories used in bounding-box annotations.
# Label 16, Empty, is used for images without annotated objects and is not used as a bounding-box object class.
# Keep ids contiguous starting at 0 and keep this file consistent with dataset/data.yaml.

classes:
  0:
    common: Bird
    scientific: Ave
  1:
    common: Feral cat
    scientific: Felis catus
  2:
    common: Cattle
    scientific: Bos taurus
  3:
    common: Dog
    scientific: Canis familiaris
  4:
    common: Egyptian mongoose
    scientific: Herpestes ichneumon
  5:
    common: European badger
    scientific: Meles meles
  6:
    common: European rabbit
    scientific: Oryctolagus cuniculus
  7:
    common: Fallow deer
    scientific: Dama dama
  8:
    common: Common genet
    scientific: Genetta genetta
  9:
    common: Horse / donkey
    scientific: Equus sp
  10:
    common: Human and vehicle
    scientific: Homo sapiens
  11:
    common: Iberian hare
    scientific: Lepus granatensis
  12:
    common: Iberian lynx
    scientific: Lynx pardinus
  13:
    common: Red deer
    scientific: Cervus elaphus
  14:
    common: Red fox
    scientific: Vulpes vulpes
  15:
    common: Wild boar
    scientific: Sus scrofa
  16:
    common: Empty image
    scientific: Empty